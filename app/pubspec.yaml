name: bakery_app
description: "Bakery management mobile app for Tiệm Bánh Ninh Diêm"
publish_to: 'none'
version: 0.3.1+24

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^3.1.0
  riverpod_annotation: ^4.0.0

  # Navigation
  go_router: ^17.1.0

  # Immutable Data Classes
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0

  # HTTP Client
  dio: ^5.7.0

  # Settings storage
  shared_preferences: ^2.3.0

  # Image picker
  image_picker: ^1.1.2

  # Cached network images for photo thumbnails
  cached_network_image: ^3.4.1

  # Device info
  device_info_plus: ^11.0.0
  package_info_plus: ^8.0.0

  # Utilities
  uuid: ^4.5.1
  intl: ^0.19.0
  collection: ^1.19.1

  # Share & file
  share_plus: ^10.1.4
  path_provider: ^2.1.5

  # Permissions
  permission_handler: ^11.3.0

  # Printing
  print_bluetooth_thermal: ^1.1.1
  image: ^4.8.0
  web: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Linting
  flutter_lints: ^6.0.0

  # Code Generation
  build_runner: ^2.4.13
  freezed: ^3.2.3
  json_serializable: ^6.8.0
  riverpod_generator: ^4.0.0+1

flutter:
  uses-material-design: true
