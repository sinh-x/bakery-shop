name: bakery_app
description: "Bakery management mobile app for Tiệm Bánh Ninh Diêm"
publish_to: 'none'
version: 0.7.7+87

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^3.1.0
  riverpod_annotation: ^4.0.0

  # Navigation
  go_router: ^17.2.3

  # Immutable Data Classes
  freezed_annotation: ^3.1.0
  json_annotation: ^4.12.0

  # HTTP Client
  dio: ^5.7.0

  # Settings storage
  shared_preferences: ^2.5.5

  # Image picker
  image_picker: ^1.2.2

  # Cached network images for photo thumbnails
  cached_network_image: ^3.4.1

  # Device info (patched fork: remove KGP application)
  device_info_plus:
    version: ^13.1.0
    git:
      url: https://github.com/sinh-x/plus_plugins.git
      path: packages/device_info_plus/device_info_plus
      ref: f82ffe2e85ab7815bbb6f0f92c0b859e53f06df7
  package_info_plus:
    version: ^10.1.0
    git:
      url: https://github.com/sinh-x/plus_plugins.git
      path: packages/package_info_plus/package_info_plus
      ref: f82ffe2e85ab7815bbb6f0f92c0b859e53f06df7

  # Utilities
  uuid: ^4.5.1
  intl: ^0.20.2
  collection: ^1.19.1

  # Share & file (patched fork: remove KGP application)
  share_plus:
    version: ^13.1.0
    git:
      url: https://github.com/sinh-x/plus_plugins.git
      path: packages/share_plus/share_plus
      ref: f82ffe2e85ab7815bbb6f0f92c0b859e53f06df7
  path_provider: ^2.1.5

  # Permissions
  permission_handler: ^12.0.1

  # URL launcher (for tap-to-call)
  url_launcher: ^6.3.1

  # Printing (patched fork: remove KGP application)
  print_bluetooth_thermal:
    version: ^1.2.2
    git:
      url: https://github.com/sinh-x/print_bluetooth_thermal.git
      ref: 3afdcc965026a2c60bf86f4506ae039b508edde3
  image: ^4.8.0
  web: ^1.1.0
  gal: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Testing
  mockito: ^5.4.4

  # Linting
  flutter_lints: ^6.0.0

  # Code Generation
  build_runner: ^2.15.0
  freezed: ^3.2.3
  json_serializable: ^6.14.0
  riverpod_generator: ^4.0.0+1

dependency_overrides:
  image_picker_android:
    git:
      url: https://github.com/sinh-x/packages.git
      path: packages/image_picker/image_picker_android
      ref: 93cb01705707d5228bb5257f5bffa3ab11ee028d
  shared_preferences_android:
    git:
      url: https://github.com/sinh-x/packages.git
      path: packages/shared_preferences/shared_preferences_android
      ref: 3516e5e1211055e39db084327bdfc76d45ca7b7f
  url_launcher_android:
    git:
      url: https://github.com/sinh-x/packages.git
      path: packages/url_launcher/url_launcher_android
      ref: 93cb01705707d5228bb5257f5bffa3ab11ee028d

flutter:
  uses-material-design: true
