name: CI

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-tests:
    # Runs when Python source or config changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -e ".[dev,web]" ruff

      - name: Lint (Ruff minimal)
        run: python -m ruff check src tests --select E9,F63,F7,F82

      - name: Run tests
        timeout-minutes: 5
        run: python -m pytest tests -v

  flutter-checks:
    # Runs when Flutter app changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: stable

      - name: Get dependencies
        run: flutter pub get
        working-directory: app

      - name: Analyze
        run: flutter analyze
        working-directory: app

      - name: Analyze (Dart)
        run: dart analyze
        working-directory: app

      - name: Test with coverage
        run: flutter test --coverage
        working-directory: app

      - name: Check dependency health
        run: flutter pub outdated --no-color
        working-directory: app
        continue-on-error: true

      - name: Check code generation freshness
        run: |
          git checkout -- pubspec.lock
          dart run build_runner build --delete-conflicting-outputs
          git diff --exit-code
        working-directory: app

  docker-build:
    # Runs when backend source or Dockerfile changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build .
