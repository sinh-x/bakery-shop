name: CI

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-tests:
    # Runs when Python source or config changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -e ".[dev,web]"

      - name: Run tests
        run: pytest

  flutter-checks:
    # Runs when Flutter app changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Get dependencies
        run: flutter pub get
        working-directory: app

      - name: Analyze
        run: flutter analyze --allow-warnings
        working-directory: app

      - name: Test
        run: flutter test
        working-directory: app

      - name: Check code generation freshness
        run: |
          dart run build_runner build --delete-conflicting-outputs
          git diff --exit-code lib/data/models/
        working-directory: app

  docker-build:
    # Runs when backend source or Dockerfile changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build .
