name: Auto Patch Version

on:
  push:
    branches: [develop]
    paths-ignore:
      - 'app/pubspec.yaml'
      - 'pyproject.toml'

permissions:
  actions: read
  contents: write

concurrency:
  group: version-bump-develop
  cancel-in-progress: false

jobs:
  bump-patch:
    if: "${{ github.actor != 'github-actions[bot]' && !contains(github.event.head_commit.message, 'chore(release): bump patch version') }}"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: develop
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: pip install uv

      - name: Wait for CI success
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for attempt in $(seq 1 90); do
            ci_state=$(gh run list \
              --repo "$GITHUB_REPOSITORY" \
              --workflow CI \
              --branch develop \
              --commit "$GITHUB_SHA" \
              --event push \
              --limit 1 \
              --json status,conclusion \
              --jq 'if length == 0 then "missing" else (.[0].status + ":" + (.[0].conclusion // "")) end')

            case "$ci_state" in
              completed:success)
                echo "CI succeeded for $GITHUB_SHA."
                exit 0
                ;;
              completed:*)
                echo "CI did not succeed for $GITHUB_SHA: $ci_state"
                exit 1
                ;;
              *)
                echo "Waiting for CI for $GITHUB_SHA: $ci_state ($attempt/90)"
                sleep 10
                ;;
            esac
          done

          echo "Timed out waiting for CI success for $GITHUB_SHA."
          exit 1

      - name: Bump patch version
        id: bump
        run: |
          python <<'PY' >> "$GITHUB_OUTPUT"
          from pathlib import Path
          import re

          pubspec = Path("app/pubspec.yaml")
          pyproject = Path("pyproject.toml")

          pubspec_text = pubspec.read_text()
          match = re.search(r"^version:\s*(\d+)\.(\d+)\.(\d+)(?:\+(\d+))?\s*$", pubspec_text, re.MULTILINE)
          if not match:
              raise SystemExit("Could not find app/pubspec.yaml version in MAJOR.MINOR.PATCH+BUILD format")

          major, minor, patch, build = match.groups()
          next_base = f"{major}.{minor}.{int(patch) + 1}"
          next_build = int(build or 0) + 1
          next_flutter = f"{next_base}+{next_build}"

          pubspec_text = re.sub(
              r"^version:\s*.*$",
              f"version: {next_flutter}",
              pubspec_text,
              count=1,
              flags=re.MULTILINE,
          )
          pubspec.write_text(pubspec_text)

          pyproject_text = pyproject.read_text()
          pyproject_text = re.sub(
              r'^version = ".*"$',
              f'version = "{next_base}"',
              pyproject_text,
              count=1,
              flags=re.MULTILINE,
          )
          pyproject.write_text(pyproject_text)

          print(f"base={next_base}")
          print(f"flutter={next_flutter}")
          PY

      - name: Refresh uv.lock
        run: uv lock

      - name: Commit version bump
        run: |
          if git diff --quiet -- app/pubspec.yaml pyproject.toml uv.lock; then
            echo "No version changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/pubspec.yaml pyproject.toml uv.lock
          git commit -m "chore(release): bump patch version to ${{ steps.bump.outputs.flutter }} [skip ci]"
          git push origin HEAD:develop
