# Branch Strategy: Git-Flow
# ----------------------------------------
# main     — production releases only (tagged)
# develop  — integration branch, always deployable
# feature/ — new work, branch from develop
# release/ — pre-release stabilisation, branch from develop
# hotfix/  — urgent production fixes, branch from main

strategy: git-flow

branches:
  main:
    purpose: Production releases
    protected: true
    merge_from: [release/*, hotfix/*]
    tagging: required  # always tag with vX.Y.Z on merge
    direct_commits: false

  develop:
    purpose: Main development integration branch
    protected: true
    merge_from: [feature/*, release/*, hotfix/*]
    direct_commits: false  # always merge via PR/feature branch

  feature/*:
    purpose: New features and improvements
    branch_from: develop
    merge_into: develop
    naming: feature/<short-kebab-topic>
    example: feature/order-management

  release/*:
    purpose: Pre-release stabilisation (bug fixes, version bumps, docs only)
    branch_from: develop
    merge_into: [main, develop]
    naming: release/vX.Y.Z
    example: release/v0.3.0

  hotfix/*:
    purpose: Urgent production bug fixes
    branch_from: main
    merge_into: [main, develop]
    naming: hotfix/<short-kebab-topic>
    example: hotfix/api-crash-on-empty-db

versioning:
  scheme: semver+build  # vMAJOR.MINOR.PATCH+BUILD
  current: v0.2.0+1
  build_number:
    auto_bump: true      # every merge/PR into develop increments BUILD
    scope: develop       # only merges into develop trigger auto-bump
    format: integer      # 1, 2, 3, ...
  manual_bump:
    patch: bug fixes, hotfixes (e.g. v0.2.0 → v0.2.1)
    minor: new features (e.g. v0.2.0 → v0.3.0)
    major: breaking changes (e.g. v0.2.0 → v1.0.0)
  examples:
    - v0.2.0+1   # first merge into develop after v0.2.0 release
    - v0.2.0+7   # seventh merge, still pre-release
    - v0.3.0+1   # minor bump after release, build resets to 1
  release_tagging: vMAJOR.MINOR.PATCH  # strip build number on main tag

workflow:
  new_feature:
    - git checkout develop
    - git pull
    - git checkout -b feature/<topic>
    - "... commit work ..."
    - git checkout develop
    - git merge --no-ff feature/<topic>
    - git branch -d feature/<topic>

  new_release:
    - git checkout -b release/vX.Y.Z develop
    - "... bump version, fix final bugs ..."
    - git checkout main && git merge --no-ff release/vX.Y.Z
    - git tag -a vX.Y.Z
    - git checkout develop && git merge --no-ff release/vX.Y.Z
    - git branch -d release/vX.Y.Z

  hotfix:
    - git checkout -b hotfix/<topic> main
    - "... fix ..."
    - git checkout main && git merge --no-ff hotfix/<topic>
    - git tag -a vX.Y.Z+1
    - git checkout develop && git merge --no-ff hotfix/<topic>
    - git branch -d hotfix/<topic>
