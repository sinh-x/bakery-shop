services:
  baker-prod:
    build:
      context: .
      args:
        UID: ${BAKER_UID:-1000}
    image: baker-server
    profiles: [prod]
    ports:
      - "2108:2108"
    volumes:
      - ./prod/data:/var/lib/baker
    devices:
      - "/dev/usb/lp0:/dev/usb/lp0"
    group_add:
      - "20"  # host GID 'lp' — grants access to /dev/usb/lp0
    environment:
      BAKER_DATA_DIR: /var/lib/baker
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:2108/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
  caddy:
    image: caddy:2-alpine
    profiles: [prod]
    ports:
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:?DOMAIN not set — copy config/docker.example to .env}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./web-build:/srv/web:ro
      - ./certs:/certs:ro
    depends_on:
      - baker-prod
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
  baker-dev:
    build:
      context: .
      args:
        UID: ${BAKER_UID:-1000}
    image: baker-server
    profiles: [dev]
    ports:
      - "2312:2312"
    volumes:
      - ./data:/var/lib/baker
    environment:
      BAKER_DATA_DIR: /var/lib/baker
      BAKER_PORT: 2312
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:2312/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
