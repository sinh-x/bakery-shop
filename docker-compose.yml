services:
  baker-prod:
    build:
      context: .
      args:
        UID: ${BAKER_UID:-1000}
        BAKER_BUILD_FINGERPRINT: ${BAKER_BUILD_FINGERPRINT:-unknown}
    image: baker-server
    profiles: [prod]
    ports:
      - "2108:2108"
    volumes:
      - ./prod/data:/var/lib/baker
    # When BAKER_PRINT_IPP_URL is set (IPP mode), the /dev/usb/lp0 device mount
    # is not needed and can be removed for cloud deployments.
    devices:
      - "${BAKER_PRINTER_DEVICE:-/dev/usb/lp0}:/dev/usb/lp0"
    group_add:
      - "20"  # host GID 'lp' grants access to /dev/usb/lp0; name may differ in-container
    environment:
      BAKER_DATA_DIR: /var/lib/baker
      BAKER_BUILD_FINGERPRINT: ${BAKER_BUILD_FINGERPRINT:-unknown}
      # Printer paper type server default ("label" | "roll"); runtime override via Settings screen.
      # Unset defaults to "label" (backward compatible); invalid values fail fast at startup.
      PAPER_MODE: ${PAPER_MODE:-label}
      BAKER_PRINT_IPP_URL: ${BAKER_PRINT_IPP_URL:-}
      # IPP transport uses plain HTTP to the CUPS endpoint (no TLS).
      # When the endpoint is on the Tailscale tailnet (default deployment),
      # WireGuard provides transport encryption between baker-prod and Lily.
      # Non-Tailscale deployments MUST use a VPN tunnel or reverse proxy with TLS
      # termination — plain HTTP over untrusted networks exposes print jobs in
      # cleartext.
      TRAIL_MM: ${TRAIL_MM:-20}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:2108/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
  caddy:
    image: caddy:2-alpine
    profiles: [prod]
    ports:
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:?DOMAIN not set — copy config/docker.example to .env}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./web-build:/srv/web:ro
      - ./certs:/certs:ro
    depends_on:
      - baker-prod
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
  # Dev front-end for the bakery app on drgnfly. TLS is terminated by the
  # central drgnfly-caddy gateway (owns :443 for the tailnet FQDN); this
  # service only serves plain HTTP on host loopback 127.0.0.1:2380, and the
  # gateway reverse-proxies the domain root to it. Serves web-build + /api.
  caddy-dev:
    image: caddy:2-alpine
    profiles: [dev]
    ports:
      - "127.0.0.1:2380:80"
    volumes:
      - ./Caddyfile.dev:/etc/caddy/Caddyfile:ro
      - ./web-build:/srv/web:ro
    depends_on:
      - baker-dev
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
  baker-dev:
    build:
      context: .
      args:
        UID: ${BAKER_UID:-1000}
        BAKER_BUILD_FINGERPRINT: ${BAKER_BUILD_FINGERPRINT:-unknown}
    image: baker-server
    profiles: [dev]
    ports:
      - "2312:2312"
    volumes:
      - ./data:/var/lib/baker
    # When BAKER_PRINT_IPP_URL is set (IPP mode), the /dev/usb/lp0 device mount
    # is not needed and can be removed for cloud deployments.
    devices:
      - "${BAKER_PRINTER_DEVICE:-/dev/usb/lp0}:/dev/usb/lp0"
    group_add:
      - "20"  # host GID 'lp' grants access to /dev/usb/lp0
    environment:
      BAKER_DATA_DIR: /var/lib/baker
      BAKER_PORT: 2312
      BAKER_BUILD_FINGERPRINT: ${BAKER_BUILD_FINGERPRINT:-unknown}
      # Printer paper type server default ("label" | "roll"); runtime override via Settings screen.
      # Unset defaults to "label" (backward compatible); invalid values fail fast at startup.
      PAPER_MODE: ${PAPER_MODE:-label}
      BAKER_PRINT_IPP_URL: ${BAKER_PRINT_IPP_URL:-}
      # IPP transport uses plain HTTP to the CUPS endpoint (no TLS).
      # When the endpoint is on the Tailscale tailnet (default deployment),
      # WireGuard provides transport encryption between baker-dev and Lily.
      # Non-Tailscale deployments MUST use a VPN tunnel or reverse proxy with TLS
      # termination — plain HTTP over untrusted networks exposes print jobs in
      # cleartext.
      TRAIL_MM: ${TRAIL_MM:-20}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:2312/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
